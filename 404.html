<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | SpeedCheck Pro</title>
  <meta name="robots" content="noindex" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Syne', sans-serif;
      background: #0a0f1e;
      color: #e8edf5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .wrap { max-width: 480px; }
    .icon { font-size: 5rem; margin-bottom: 24px; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.03em; }
    p { color: #8b95a8; margin-bottom: 32px; line-height: 1.6; }
    a {
      display: inline-block;
      padding: 12px 28px;
      background: linear-gradient(135deg, #00d4ff, #0091ff);
      color: white;
      border-radius: 10px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
    }
    a:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">⚡</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist.<br>Head back to run a speed test.</p>
    <a href="/speedcheck-pro/">Go to SpeedCheck Pro</a>
  </div>
</body>
</html>
